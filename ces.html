<script>
    var str = ['0', '1', '2', ];
    function generateMixed(n) {
        var res = "";
        for (var i = 0; i < n; i++) {
            var id = Math.ceil(Math.random() * 2);
            res += str[id];
        }
        return res;
    }
    alert(generateMixed(6));
</script>
